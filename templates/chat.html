{% extends "layout.html" %}
{% block title %}Chatbot - GameVerse AI{% endblock %}
{% block content %}
<section class="chat-shell container py-4">
    <div class="chat-header">
        <div>
            <p class="eyebrow">Live AI Assistant</p>
            <h1>GameVerse Chat</h1>
        </div>
        <div class="chat-actions">
            <button class="btn btn-outline-light btn-sm" id="downloadChat" type="button">Download</button>
            <button class="btn btn-outline-light btn-sm" id="clearChat" type="button">Clear</button>
        </div>
    </div>
    <div class="chat-window" id="chatWindow" aria-live="polite"></div>
    <form class="chat-input-row" id="chatForm">
        <textarea id="chatInput" class="form-control" rows="2" placeholder="Ask about games, recommendations, specs, endings, or comparisons"></textarea>
        <div class="chat-submit-actions">
            <button class="btn btn-outline-light" id="stopChat" type="button" disabled>Stop</button>
            <button class="btn btn-accent" id="sendChat" type="submit">Send</button>
        </div>
    </form>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
