<article class="game-card">
    <img src="{{ game.image_url }}" alt="{{ game.name }} cover art" loading="lazy">
    <div class="game-card-body">
        <div>
            <h3>{{ game.name }}</h3>
            <p>{{ game.genre }}</p>
        </div>
        <dl class="meta-grid">
            <div><dt>Developer</dt><dd>{{ game.developer }}</dd></div>
            <div><dt>Steam</dt><dd>{{ "%.1f"|format(game.steam_rating) }}/10</dd></div>
            <div><dt>Year</dt><dd>{{ game.release_year }}</dd></div>
        </dl>
        <a class="btn btn-sm btn-outline-light" href="{{ url_for('games.detail', slug=game.slug) }}">View Details</a>
    </div>
</article>
