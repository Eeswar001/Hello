<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="GameVerse AI is an intelligent gaming assistant for discovery, specs, FPS, compatibility, and AI chat.">
    <title>{% block title %}GameVerse AI{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark sticky-top glass-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('home.index') }}">GameVerse AI</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto gap-lg-2">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('home.index') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('games.list_games') }}">Games</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('chat.chat') }}">Chatbot</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('home.about') }}">About</a></li>
            </ul>
        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="footer-band mt-5">
    <div class="container py-4 d-flex flex-column flex-md-row justify-content-between gap-3">
        <div>
            <strong>GameVerse AI</strong>
            <p class="mb-0 text-secondary">Excel-backed discovery, PC compatibility, FPS insights, and streaming AI chat.</p>
        </div>
        <div class="text-secondary">Built with Flask, Pandas, Bootstrap 5, and an OpenAI-compatible LLM.</div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
